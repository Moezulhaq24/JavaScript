<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM | Edit and Remove Elements</title>
</head>
<body style="background-color: black; color: white; font-size: 30px;">
    <ul class="language">
        <li>JavaScript</li>
    </ul>

</body>
<script>
    function addlanguage (langName){
        const li = document.createElement('li')
        li.innerHTML = `${langName}`
        document.querySelector('.language').appendChild(li)
    }
    addlanguage('Python')
    addlanguage('TypeScript')

    function addOptiLang (langname){
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(langname))
        document.querySelector('.language').appendChild(li)
    }
    addOptiLang('Golang')

    // Editing the values

    const secondlang = document.querySelector("li:nth-child(2)")
    // secondlang.innerHTML = "NextJS"

    const newli = document.createElement('li')
    newli.textContent = "React"
    secondlang.replaceWith(newli)

    const firstlang = document.querySelector("li:first-child")
    firstlang.outerHTML = '<li>NODE JS</li>'
    
    // remove values
    const lastlang = document.querySelector('li:last-child')
    lastlang.remove()
</script>
</html>
